<!DOCTYPE html>
<html lang="ar">
<head>

    <title>KING SULAIMAN - Cybersecurity Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            background: linear-gradient(135deg, #0a0e17 0%, #0f172a 100%);

            font-family: system-ui, sans-serif;

        .warning {
            background: #1e1b4b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            background: #10b981;
            color: #0a0e17;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            margin: 10px;
            font-weight: bold;
        }
        .footer { text-align: center; padding: 30px; margin-top: 40px; color: #5b6b8c; }
